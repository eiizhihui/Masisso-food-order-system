<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Massiso - Profile</title>
    <link rel="stylesheet" href="style.css?v=8">
</head>
<body>
    <header class="app-header" style="background-color: #e65100; margin: 0; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
        <div class="top-brand-row" style="display: flex; justify-content: space-between; align-items: center; padding: 15px 20px;">
            <div class="logo" style="color: white; font-weight: bold; font-size: 24px; font-style: italic; margin: 0; cursor: pointer;" onclick="window.location.href='index.html'">Masisso</div>
        </div>
    </header>
    <div style="padding: 20px; max-width: 800px; margin: auto;">
        <h2 style="color: var(--primary-orange);">My Profile</h2>
        
        <div style="background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
            <div id="profile-view-mode">
                <p><strong>Name:</strong> <span id="display-name">Loading...</span></p>
                <p><strong>Email:</strong> <span id="display-email">Loading...</span></p>
                <p><strong>Phone:</strong> <span id="display-phone">Loading...</span></p>
                <p><strong>Default Address:</strong> <span id="display-address">Loading...</span></p>
                <button class="add-btn solid-btn" onclick="toggleEditProfile()" style="margin-top: 20px;">Edit Profile</button>
            </div>

            <div id="profile-edit-mode" style="display: none;">
                <p><strong>Name:</strong><br><input type="text" id="edit-name" style="width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px;"></p>
                <p><strong>Email:</strong><br><input type="email" id="edit-email" style="width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px;"></p>
                <p><strong>Phone:</strong><br><input type="text" id="edit-phone" style="width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px;"></p>
                <p><strong>Address:</strong><br><textarea id="edit-address" style="width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; height: 60px; font-family: Arial;"></textarea></p>
                
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button class="add-btn" onclick="saveProfile()" style="flex: 1; background-color: #4CAF50; color: white; border-color: #4CAF50; margin: 0;">Save Changes</button>
                    <button class="add-btn" onclick="toggleEditProfile()" style="flex: 1; border-color: #ccc; color: #555; margin: 0;">Cancel</button>
                </div>
            </div>

            <button class="add-btn" style="width: 100%; margin-top: 15px; border-color: #ccc; color: #555;">Log Out</button> 
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item-bottom">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            <span>Home</span>
        </a>
        <a href="offers.html" class="nav-item-bottom">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line></svg>
            <span>Offers</span>
        </a>
        <a href="rewards.html" class="nav-item-bottom">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m2 4 3 12h14l3-12-6 7-4-7-4 7-6-7zm3 16h14"></path></svg>
            <span>Rewards</span>
        </a>
        <a href="profile.html" class="nav-item-bottom active">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            <span>Profile</span>
        </a>
    </nav>
    <script src="script.js?v=7"></script>
</body>
</html>
