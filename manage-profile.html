<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masisso - Manage Profile</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
        }

        .header {
            background-color: var(--primary-orange);
            color: white;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .header h2 {
            margin: 0;
            font-size: 24px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-left h2 {
            margin: 0;
            font-size: 24px;
        }

        .header a {
            color: white;
            text-decoration: none;
            font-size: 20px;
            margin: 0;
        }

        .profile-container {
            max-width: 500px;
            margin: 40px auto;
            padding: 30px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            text-align: center;
            box-sizing: border-box;
            margin-bottom: 120px;
        }

        .profile-header h2 {
            color: var(--primary-orange);
            margin: 0 0 5px 0;
        }

        .profile-header p {
            color: #777;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 18px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            color: var(--text-dark);
            font-size: 14px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 15px;
            background-color: white;
            font-family: inherit;
        }

        .submit-profile-btn {
            background: var(--primary-orange);
            color: white;
            border: none;
            border-radius: 10px;
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 10px;
        }

        .submit-profile-btn:active {
            opacity: 0.8;
        }
    </style>
</head>

<body>

    <div class="header">
        <div class="header-left">
            <a href="admin-dashboard.html" aria-label="Back to Dashboard"><i class="fas fa-arrow-left"></i></a>
            <h2>Profile</h2>
        </div>
        <button id="edit-profile-btn" onclick="toggleEditMode()" style="background:transparent; border:none; color:white; font-size:18px; cursor:pointer;"><i class="fas fa-edit"></i> Edit</button>
    </div>

    <div class="profile-container">
        <div class="profile-header">
            <h2>Admin Profile</h2>
            <p>Update your personal and login information</p>
        </div>

        <form onsubmit="return false;">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" placeholder="Enter your name" required disabled>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="name@masisso.com" required disabled>
            </div>

            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="text" id="phone" placeholder="Enter phone number" disabled>
            </div>

            <div class="form-group">
                <label for="branch">Branch</label>
                <input type="text" id="branch" placeholder="Branch" disabled>
            </div>

            <div class="form-group">
                <label for="password">New Password (leave blank to keep current)</label>
                <input type="password" id="password" placeholder="Enter new password" disabled>
            </div>

            <button type="button" class="submit-profile-btn" id="update-profile-btn" onclick="saveProfileData()" style="display:none;">Update Profile</button>
        </form>
    </div>

    <div class="bottom-nav">
        <a href="admin-dashboard.html" class="nav-item-bottom">
            <i class="fas fa-home"></i>
            <span>Dashboard</span>
        </a>
        <a href="manage-user.html" class="nav-item-bottom">
            <i class="fas fa-users"></i>
            <span>Users</span>
        </a>
        <a href="manage-order.html" class="nav-item-bottom">
            <i class="fas fa-clipboard-list"></i>
            <span>Orders</span>
        </a>
        <a href="manage-menu.html" class="nav-item-bottom">
            <i class="fas fa-utensils"></i>
            <span>Menu</span>
        </a>
        <a href="manage-event.html" class="nav-item-bottom">
            <i class="fas fa-calendar-alt"></i>
            <span>Events</span>
        </a>
        <a href="manage-reward.html" class="nav-item-bottom">
            <i class="fas fa-gift"></i>
            <span>Rewards</span>
        </a>
        <a href="manage-profile.html" class="nav-item-bottom active">
            <i class="fas fa-user-cog"></i>
            <span>Profile</span>
        </a>
    </div>

    <script>
        const adminUserId = 2000;

        function toggleEditMode() {
            const inputs = document.querySelectorAll('#name, #email, #phone, #branch, #password');
            inputs.forEach(input => input.disabled = false);
            document.getElementById('update-profile-btn').style.display = 'block';
            document.getElementById('edit-profile-btn').style.display = 'none';
        }

        document.addEventListener('DOMContentLoaded', () => {
            fetch('admin-php/user-read.php')
                .then(res => res.json())
                .then(users => {
                    const admin = users.find(u => parseInt(u.user_id) === adminUserId);
                    if (admin) {
                        document.getElementById('name').value = admin.name || '';
                        document.getElementById('email').value = admin.email || '';
                        document.getElementById('phone').value = admin.phone || '';
                        document.getElementById('branch').value = admin.branch || '';
                    } else {
                        alert("Could not load admin profile data.");
                    }
                })
                .catch(err => {
                    console.error("Error fetching user data:", err);
                    alert("Error loading profile details.");
                });
        });

        function saveProfileData() {
            const nameVal = document.getElementById('name').value.trim();
            const emailVal = document.getElementById('email').value.trim();
            const phoneVal = document.getElementById('phone').value.trim();
            const branchVal = document.getElementById('branch').value.trim();
            const passwordVal = document.getElementById('password').value;

            if (!nameVal || !emailVal) {
                alert("Name and Email are mandatory.");
                return;
            }

            const dataPayload = {
                user_id: adminUserId,
                role: 'super admin',
                name: nameVal,
                email: emailVal,
                phone: phoneVal,
                branch: branchVal
            };

            if (passwordVal.trim() !== '') {
                dataPayload.password = passwordVal;
            }

            fetch('admin-php/profile-update.php', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(dataPayload)
            })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        alert("Profile updated successfully!");
                        document.getElementById('password').value = ''; // clear password field
                    } else {
                        alert("Database Error: " + (data.error || 'Unknown error'));
                    }
                })
                .catch(error => {
                    console.error('Submission Error:', error);
                    alert("Could not complete profile update request.");
                });
        }
    </script>
</body>

</html>
