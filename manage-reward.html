<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Rewards</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .main-content { margin: 0 auto !important; }
        .header {
            background-color: var(--primary-orange);
            color: white;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header-left {
            display: flex;
            align-items: center;
        }
        .header a {
            color: white;
            text-decoration: none;
            margin-right: 15px;
            font-size: 20px;
        }
        .add-new-btn {
            background: white;
            color: var(--primary-orange);
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .list-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }

        .reward-card {
            background: white;
            border-radius: 10px;
            padding: 15px;
            display: flex;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            border-left: 5px solid #9C27B0;
        }
        
        .reward-img {
            width: 70px;
            height: 70px;
            border-radius: 10px;
            object-fit: cover;
            margin-right: 15px;
            background: #f4f4f4;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #aaa;
        }

        .reward-info {
            flex-grow: 1;
        }

        .reward-info h4 {
            margin: 0 0 5px 0;
            color: #333;
        }
        
        .reward-bowls {
            font-weight: bold;
            color: var(--primary-orange);
            font-size: 14px;
        }

        .reward-actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-left: 10px;
        }

        .reward-actions button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
        }
        .edit-btn { color: #2196F3; }
        .delete-btn { color: #f44336; }

        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-left">
            <a href="admin-dashboard.html" aria-label="Back to Dashboard"><i class="fas fa-arrow-left"></i></a>
            <h2>Manage Rewards</h2>
        </div>
        <button class="add-new-btn" onclick="openRewardModal()"><i class="fas fa-plus"></i> Add</button>
    </div>

    <div class="main-content">
        <div class="nav-search" style="margin-bottom: 20px;">
            <input type="text" id="search-input" placeholder="Search rewards..." oninput="searchRewards(this.value)" style="width:100%; padding: 10px;">
        </div>
        <div class="list-container" id="reward-list">
            <!-- Reward items injected by JS -->
        </div>
    </div>

    <!-- Reward Modal -->
    <div id="rewardModal" class="modal">
        <div class="modal-box">
            <span class="close-btn" onclick="closeModal('rewardModal')">&times;</span>
            <h3 id="modal-title" style="margin-top:0;">Add Reward</h3>
            <div class="form-group">
                <label>Title</label>
                <input type="text" id="reward-title">
            </div>
            <div class="form-group">
                <label>Bowls Required 🍜</label>
                <input type="number" id="reward-bowls" min="1">
            </div>
            <div class="form-group">
                <label>Image Filename</label>
                <input type="text" id="reward-image" placeholder="e.g. voucher.jpg">
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal('rewardModal')">Cancel</button>
                <button class="btn-confirm" onclick="saveReward()">Save</button>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="admin-dashboard.html" class="nav-item-bottom">
            <i class="fas fa-home"></i>
            <span>Dashboard</span>
        </a>
        <a href="manage-user.html" class="nav-item-bottom">
            <i class="fas fa-users"></i>
            <span>Users</span>
        </a>
        <a href="manage-order.html" class="nav-item-bottom">
            <i class="fas fa-clipboard-list"></i>
            <span>Orders</span>
        </a>
        <a href="manage-menu.html" class="nav-item-bottom">
            <i class="fas fa-utensils"></i>
            <span>Menu</span>
        </a>
        <a href="manage-event.html" class="nav-item-bottom">
            <i class="fas fa-calendar-alt"></i>
            <span>Events</span>
        </a>
        <a href="manage-reward.html" class="nav-item-bottom active">
            <i class="fas fa-gift"></i>
            <span>Rewards</span>
        </a>
    </div>

    <script src="admin.js"></script>

</body>
</html>
