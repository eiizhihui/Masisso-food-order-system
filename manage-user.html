<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Users</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .main-content { margin: 0 auto !important; }
        .header {
            background-color: var(--primary-orange);
            color: white;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header-left {
            display: flex;
            align-items: center;
        }
        .header a {
            color: white;
            text-decoration: none;
            margin-right: 15px;
            font-size: 20px;
        }
        .add-new-btn {
            background: white;
            color: var(--primary-orange);
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .list-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }

        .list-card {
            background: white;
            border-radius: 10px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            border-left: 5px solid var(--primary-orange);
        }

        .list-info h4 {
            margin: 0 0 5px 0;
            color: #333;
        }

        .list-info p {
            margin: 0;
            color: #777;
            font-size: 14px;
        }

        .list-actions button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            margin-left: 10px;
        }
        .edit-btn { color: #2196F3; }
        .delete-btn { color: #f44336; }

        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-left">
            <a href="admin-dashboard.html" aria-label="Back to Dashboard"><i class="fas fa-arrow-left"></i></a>
            <h2>Manage Users</h2>
        </div>
        <button class="add-new-btn" onclick="openUserModal()"><i class="fas fa-plus"></i> Add</button>
    </div>

    <div class="main-content">
        <div class="nav-search" style="margin-bottom: 20px;">
            <input type="text" id="search-input" placeholder="Search users..." oninput="searchUsers(this.value)" style="width:100%; padding: 10px;">
        </div>
        <div class="list-container" id="user-list">
            <!-- User items injected by JS -->
        </div>
    </div>

    <!-- Edit User Modal -->
    <div id="editModal" class="modal">
        <div class="modal-box">
            <span class="close-btn" onclick="closeModal('editModal')">&times;</span>
            <h3 id="modal-title" style="margin-top:0;">Edit User</h3>
            <div class="form-group">
                <label>Name</label>
                <input type="text" id="edit-name">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="edit-email">
            </div>
            <div class="form-group">
                <label>Role</label>
                <select id="edit-role">
                    <option value="Customer">Customer</option>
                    <option value="Admin">Admin</option>
                </select>
            </div>
            <div class="form-group">
                <label>Bowls</label>
                <input type="number" id="edit-bowls" min="0">
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal('editModal')">Cancel</button>
                <button class="btn-confirm" onclick="saveUser()">Save</button>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="admin-dashboard.html" class="nav-item-bottom">
            <i class="fas fa-home"></i>
            <span>Dashboard</span>
        </a>
        <a href="manage-user.html" class="nav-item-bottom active">
            <i class="fas fa-users"></i>
            <span>Users</span>
        </a>
        <a href="manage-order.html" class="nav-item-bottom">
            <i class="fas fa-clipboard-list"></i>
            <span>Orders</span>
        </a>
        <a href="manage-menu.html" class="nav-item-bottom">
            <i class="fas fa-utensils"></i>
            <span>Menu</span>
        </a>
        <a href="manage-event.html" class="nav-item-bottom">
            <i class="fas fa-calendar-alt"></i>
            <span>Events</span>
        </a>
        <a href="manage-reward.html" class="nav-item-bottom">
            <i class="fas fa-gift"></i>
            <span>Rewards</span>
        </a>
    </div>

    <script src="admin.js"></script>
</body>
</html>
